server {
    server_name mist.labmetrics.dev;

    location = /webhook/dnt {
        proxy_pass http://127.0.0.1:9001/webhook/dnt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }

    location = /health {
        proxy_pass http://127.0.0.1:9001/health;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    location / {
        return 404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mist.labmetrics.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mist.labmetrics.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = mist.labmetrics.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mist.labmetrics.dev;
    return 404; # managed by Certbot
}